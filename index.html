<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>RJPQ 浪漫版</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0a0a0a; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; }
        .container { width: 100%; max-width: 360px; padding: 15px; box-sizing: border-box; }
        .title { text-align: center; color: #ffc107; font-size: 1.4rem; margin-bottom: 15px; font-weight: bold; }
        
        /* 置頂按鈕樣式 */
        .pip-btn { width: 100%; padding: 10px; border: 2px solid #3ddc84; border-radius: 10px; background: transparent; color: #3ddc84; cursor: pointer; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .pip-btn:hover { background: #3ddc84; color: #000; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; padding-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; text-align: center; font-size: 16px; }
        .login-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #007bff; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .member-box { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; border: 1px dashed #444; text-align: center; }
        .member-tag { display: inline-block; background: #333; padding: 2px 8px; border-radius: 12px; margin: 2px; color: #3ddc84; font-weight: bold; }
        .owner-tag { border: 1px solid #ffc107 !important; color: #ffc107 !important; }

        .colors { display: flex; justify-content: space-between; margin: 15px 0; padding: 0 5px; }
        .color { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color.active { border-color: white; transform: scale(1.1); }
        .red { background: #ff5b5b; } .yellow { background: #ffd633; } .blue { background: #3da5ff; } .green { background: #3ddc84; }
        
        .clear-btn { background: #ff3b30; margin-bottom: 15px; font-size: 14px; padding: 10px; width: 100%; color:white; border-radius:8px; border:none; cursor:pointer; font-weight: bold;}
        
        #captureArea { background: #0a0a0a; padding: 10px; border-radius: 10px; }
        .grid-container { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .row { display: flex; align-items: center; gap: 8px; }
        .floor-num { width: 22px; color: #ffc107; font-weight: bold; text-align: center; font-size: 14px; }
        .cells { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; flex-grow: 1; }
        .cell { height: 42px; background: #1a1a1a; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #333; position: relative; }
        .cell .num { font-size: 15px; font-weight: bold; color: #555; }
        .cell .name { font-size: 10px; margin-top: 2px; color: #555; font-weight: bold; }
        
        /* 隱藏用來轉換影片的元素 */
        #hiddenVideo { display: none; }
        #canvasSource { display: none; }
    </style>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="loginView">
            <div class="title">🍁 RJPQ 同步工具</div>
            <div class="input-group" style="text-align: center;"><label>By.梨花帶雨製作</label></div>
            <div class="input-group"><label>你的暱稱</label><input id="userInput" type="text" placeholder="輸入暱稱" maxlength="6"></div>
            <div class="input-group"><label>房間號碼</label><input id="roomInput" type="text" placeholder="例如：777"></div>
            <button id="joinBtn" class="login-btn">進入房間</button>
        </div>

        <div id="gameView" style="display:none;">
            <div class="title">🍁 房間 <span id="displayRoom"></span></div>
            
            <button class="pip-btn" id="startPip">📺 開啟永久置頂視窗</button>

            <div class="member-box">👥 在線成員：<div id="memberList"></div></div>
            <div class="colors">
                <div class="color red" data-color="red"></div>
                <div class="color yellow" data-color="yellow"></div>
                <div class="color blue" data-color="blue"></div>
                <div class="color green" data-color="green"></div>
            </div>
            <button class="clear-btn" id="resetBtn">清空全盤 (僅限房主)</button>
            
            <div id="captureArea">
                <div class="grid-container" id="grid"></div>
            </div>

            <div style="text-align:center; margin-top:20px; font-size:18px; color:#888;">By.梨花帶雨</div>
        </div>
    </div>

    <canvas id="canvasSource" width="360" height="500"></canvas>
    <video id="hiddenVideo" autoplay muted playsinline></video>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const config = { databaseURL: "https://pqlg-a2e9c-default-rtdb.asia-southeast1.firebasedatabase.app" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    let currentRoom = "", userName = "", selectedColor = "", serverData = {};

    // --- 子母畫面核心邏輯 ---
    const startPipBtn = document.getElementById('startPip');
    const captureArea = document.getElementById('captureArea');
    const canvas = document.getElementById('canvasSource');
    const video = document.getElementById('hiddenVideo');

    async function updatePip() {
        if (!document.pictureInPictureElement) return;
        const canvasDraw = await html2canvas(captureArea, { backgroundColor: '#0a0a0a' });
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(canvasDraw, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(updatePip);
    }

    startPipBtn.onclick = async () => {
        try {
            const stream = canvas.captureStream(10); // 10 FPS 夠用了
            video.srcObject = stream;
            await video.play();
            await video.requestPictureInPicture();
            updatePip();
        } catch (err) {
            alert("瀏覽器不支援或需要點擊頁面後再試一次！");
            console.error(err);
        }
    };

    // --- 原有邏輯 ---
    if(localStorage.getItem('rjpq_user')) document.getElementById("userInput").value = localStorage.getItem('rjpq_user');

    const join = async () => {
        userName = document.getElementById("userInput").value.trim();
        currentRoom = document.getElementById("roomInput").value.trim();
        if(!userName || !currentRoom) return alert("請填寫暱稱與房號");
        const ownerRef = ref(db, `rooms/${currentRoom}/owner`);
        const snapshot = await get(ownerRef);
        if (!snapshot.exists()) await set(ownerRef, userName);

        localStorage.setItem('rjpq_user', userName);
        document.getElementById("loginView").style.display = "none";
        document.getElementById("gameView").style.display = "block";
        document.getElementById("displayRoom").innerText = currentRoom;
        
        const myPresenceRef = ref(db, `rooms/${currentRoom}/users/${userName}`);
        set(myPresenceRef, true);
        onDisconnect(myPresenceRef).remove();
        initGrid();
        sync();
    };

    document.getElementById("joinBtn").onclick = join;

    function initGrid() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        for(let f=10; f>=1; f--) {
            const row = document.createElement("div"); row.className = "row";
            row.innerHTML = `<div class="floor-num">${f}</div>`;
            const cells = document.createElement("div"); cells.className = "cells";
            for(let c=1; c<=4; c++) {
                const id = `f${f}c${c}`;
                const cell = document.createElement("div");
                cell.className = "cell"; cell.id = id;
                cell.innerHTML = `<span class="num" id="num-${id}">${c}</span><span class="name" id="name-${id}"></span>`;
                cell.onclick = () => {
                    if(!selectedColor) return;
                    const cellRef = ref(db, `rooms/${currentRoom}/grid/${id}`);
                    const cellData = serverData.grid ? serverData.grid[id] : null;
                    if (cellData && cellData.color === selectedColor) { remove(cellRef); return; }
                    set(cellRef, { color: selectedColor, user: userName });
                };
                cells.appendChild(cell);
            }
            row.appendChild(cells); grid.appendChild(row);
        }
    }

    const textColors = { red: "#660000", yellow: "#664400", blue: "#001a33", green: "#00331a" };
    const bgColors = { red: "#ff5b5b", yellow: "#ffd633", blue: "#3da5ff", green: "#3ddc84" };

    function sync() {
        onValue(ref(db, `rooms/${currentRoom}`), (snap) => {
            serverData = snap.val() || {};
            const users = serverData.users || {};
            const owner = serverData.owner || "";
            const memberList = document.getElementById("memberList");
            const sortedUsers = Object.keys(users).sort((a,b) => a===owner?-1:b===owner?1:0);
            memberList.innerHTML = sortedUsers.map(u => `<span class="member-tag ${u===owner?'owner-tag':''}">${u}${u===owner?' 👑':''}</span>`).join('');

            document.querySelectorAll('.cell').forEach(cell => {
                const data = serverData.grid ? serverData.grid[cell.id] : null;
                const nameSpan = document.getElementById(`name-${cell.id}`);
                const numSpan = document.getElementById(`num-${cell.id}`);
                if (data) {
                    cell.style.background = bgColors[data.color];
                    numSpan.style.color = nameSpan.style.color = textColors[data.color];
                    nameSpan.innerText = data.user;
                } else {
                    cell.style.background = "#1a1a1a";
                    numSpan.style.color = nameSpan.style.color = "#555";
                    nameSpan.innerText = "";
                }
            });
        });
    }

    document.querySelectorAll('.color').forEach(el => {
        el.onclick = () => {
            selectedColor = el.dataset.color;
            document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };
    });

    document.getElementById("resetBtn").onclick = () => { 
        if (userName !== (serverData.owner || "")) return alert("房主限定！");
        if(confirm("清空？")) remove(ref(db, `rooms/${currentRoom}/grid`)); 
    };
</script>
</body>
</html>
