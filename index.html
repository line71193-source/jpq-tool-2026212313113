<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>RJPQ 同步工具 -浪漫版</title>
    <style>
        /* 基礎樣式 */
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0a0a0a; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; transition: background 0.3s; }
        .container { width: 100%; max-width: 360px; padding: 10px; box-sizing: border-box; position: relative; }
        .title { text-align: center; color: #ffc107; font-size: 1.4rem; margin-bottom: 15px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; padding-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; text-align: center; font-size: 16px; }
        .login-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #007bff; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .member-box { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; border: 1px dashed #444; text-align: center; }
        .member-tag { display: inline-block; background: #333; padding: 2px 8px; border-radius: 12px; margin: 2px; color: #3ddc84; font-weight: bold; }
        .owner-tag { border: 1px solid #ffc107 !important; color: #ffc107 !important; }

        .colors { display: flex; justify-content: space-between; margin: 15px 0; padding: 0 5px; }
        .color { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; position: relative; }
        .color.active { border-color: white; transform: scale(1.1); }
        .red { background: #ff5b5b; } .yellow { background: #ffd633; } .blue { background: #3da5ff; } .green { background: #3ddc84; }
        
        .clear-btn { background: #ff3b30; margin-bottom: 15px; font-size: 14px; padding: 8px; width: 100%; color:white; border-radius:8px; border:none; cursor:pointer; font-weight: bold;}
        
        .grid-container { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        .row { display: flex; align-items: center; gap: 6px; }
        .floor-num { width: 20px; color: #ffc107; font-weight: bold; text-align: center; font-size: 13px; flex-shrink: 0; }
        .cells { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex-grow: 1; }
        
        .cell { height: 40px; background: #1a1a1a; border-radius: 5px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 1px solid #333; user-select: none; position: relative; }
        .cell .num { font-size: 14px; font-weight: bold; color: #444; }
        .cell .name { font-size: 9px; margin-top: 1px; color: #444; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 90%; text-align: center; font-weight: bold; }
        
        .share-box { margin-top: 20px; text-align: center; font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginView">
            <div class="title">🍁 RJPQ同步工具 浪滿版</div>
            <div class="input-group" style="text-align: center;"><label>By.梨花帶雨製作</label></div>
            <div class="input-group"><label>你的暱稱</label><input id="userInput" type="text" placeholder="輸入暱稱" maxlength="6"></div>
            <div class="input-group"><label>房間號碼</label><input id="roomInput" type="text" placeholder="例如：777"></div>
            <button id="joinBtn" class="login-btn">進入房間</button>
        </div>

        <div id="gameView" style="display:none;">
            <div class="title">
                <span>🍁 房間 <span id="displayRoom"></span></span>
            </div>
            <div class="member-box">👥 在線成員：<div id="memberList">載入中...</div></div>
            <div class="colors">
                <div class="color red" data-color="red"></div>
                <div class="color yellow" data-color="yellow"></div>
                <div class="color blue" data-color="blue"></div>
                <div class="color green" data-color="green"></div>
            </div>
            <button class="clear-btn" id="resetBtn">清空全盤 (僅限房主)</button>
            <div class="grid-container" id="grid"></div>
            <div class="share-box">
                <span id="copyBtn" style="color:#007bff; cursor:pointer; text-decoration: underline;">📋 複製房間連結傳給隊友</span>
                <div style="margin-top:10px; font-size: 18px;">By.梨花帶雨</div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const config = { databaseURL: "https://pqlg-a2e9c-default-rtdb.asia-southeast1.firebasedatabase.app" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    let currentRoom = "", userName = "", selectedColor = "", serverData = {};

    if(localStorage.getItem('rjpq_user')) document.getElementById("userInput").value = localStorage.getItem('rjpq_user');

    const join = async () => {
        userName = document.getElementById("userInput").value.trim();
        currentRoom = document.getElementById("roomInput").value.trim();
        if(!userName || !currentRoom) return alert("請填寫暱稱與房號");
        
        const roomRef = ref(db, `rooms/${currentRoom}`);
        const ownerRef = ref(db, `rooms/${currentRoom}/owner`);
        const snapshot = await get(ownerRef);
        
        if (!snapshot.exists()) { await set(ownerRef, userName); }

        localStorage.setItem('rjpq_user', userName);
        document.getElementById("loginView").style.display = "none";
        document.getElementById("gameView").style.display = "block";
        document.getElementById("displayRoom").innerText = currentRoom;
        
        const myPresenceRef = ref(db, `rooms/${currentRoom}/users/${userName}`);
        await set(myPresenceRef, true);
        
        // 離線處理
        onDisconnect(myPresenceRef).remove();

        // 偵測是否全員離線，是的話刪除房間
        onValue(ref(db, `rooms/${currentRoom}/users`), (snap) => {
            if (!snap.exists()) {
                remove(roomRef);
            }
        });
        
        const url = new URL(window.location);
        url.searchParams.set('r', currentRoom);
        window.history.pushState({}, '', url);
        initGrid();
        sync();
    };

    document.getElementById("joinBtn").onclick = join;
    const params = new URLSearchParams(window.location.search);
    if(params.get('r')) {
        document.getElementById("roomInput").value = params.get('r');
        document.getElementById("userInput").focus();
    }

    function initGrid() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        for(let f=10; f>=1; f--) {
            const row = document.createElement("div"); row.className = "row";
            row.innerHTML = `<div class="floor-num">${f}</div>`;
            const cells = document.createElement("div"); cells.className = "cells";
            for(let c=1; c<=4; c++) {
                const id = `f${f}c${c}`;
                const cell = document.createElement("div");
                cell.className = "cell"; cell.id = id;
                cell.innerHTML = `<span class="num" id="num-${id}">${c}</span><span class="name" id="name-${id}"></span>`;
                cell.onclick = () => {
                    if(!selectedColor) return;
                    const cellRef = ref(db, `rooms/${currentRoom}/grid/${id}`);
                    const cellData = serverData.grid ? serverData.grid[id] : null;
                    if (cellData) { if (cellData.color === selectedColor) remove(cellRef); return; }
                    let hasSameColor = false;
                    for (let i = 1; i <= 4; i++) {
                        const checkId = `f${f}c${i}`;
                        if (serverData.grid && serverData.grid[checkId] && serverData.grid[checkId].color === selectedColor) { hasSameColor = true; break; }
                    }
                    if (!hasSameColor) set(cellRef, { color: selectedColor, user: userName });
                };
                cells.appendChild(cell);
            }
            row.appendChild(cells); grid.appendChild(row);
        }
    }

    const textColors = { red: "#660000", yellow: "#664400", blue: "#001a33", green: "#00331a" };
    const bgColors = { red: "#ff5b5b", yellow: "#ffd633", blue: "#3da5ff", green: "#3ddc84" };

    function sync() {
        onValue(ref(db, `rooms/${currentRoom}`), (snap) => {
            serverData = snap.val() || {};
            const users = serverData.users || {};
            let owner = serverData.owner || "";
            const memberList = document.getElementById("memberList");
            const onlineUsers = Object.keys(users);

            // 房主自動繼承
            if (owner && !users[owner] && onlineUsers.length > 0) {
                owner = onlineUsers[0];
                set(ref(db, `rooms/${currentRoom}/owner`), owner);
            }

            const sortedUsers = onlineUsers.sort((a, b) => {
                if (a === owner) return -1;
                if (b === owner) return 1;
                return 0;
            });

            memberList.innerHTML = sortedUsers.map(u => {
                const isOwner = (u === owner);
                return `<span class="member-tag ${isOwner ? 'owner-tag' : ''}">${u}${isOwner ? ' 👑' : ''}</span>`;
            }).join('');

            document.querySelectorAll('.cell').forEach(cell => {
                const data = serverData.grid ? serverData.grid[cell.id] : null;
                const nameSpan = document.getElementById(`name-${cell.id}`);
                const numSpan = document.getElementById(`num-${cell.id}`);
                if (data) {
                    cell.style.background = bgColors[data.color];
                    const textColor = textColors[data.color];
                    numSpan.style.color = textColor;
                    nameSpan.style.color = textColor;
                    nameSpan.innerText = data.user;
                } else {
                    cell.style.background = "#1a1a1a";
                    numSpan.style.color = "#444";
                    nameSpan.style.color = "#444";
                    nameSpan.innerText = "";
                }
            });
        });
    }

    document.querySelectorAll('.color').forEach(el => {
        el.onclick = () => {
            selectedColor = el.dataset.color;
            document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };
    });

    document.getElementById("resetBtn").onclick = () => { 
        const owner = serverData.owner || "";
        if (userName !== owner) { alert(`只有房主 [${owner}] 才能清空全盤喔！`); return; }
        if(confirm("確定要清空全盤嗎？")) remove(ref(db, `rooms/${currentRoom}/grid`)); 
    };

    document.getElementById("copyBtn").onclick = () => { navigator.clipboard.writeText(window.location.href).then(() => alert("連結已複製！")); };
</script>
</body>
</html>
